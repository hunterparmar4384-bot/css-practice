<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            width: 200px;
            height: 200px;
            background-color: yellow;
            position: relative;
            animation: box 5s infinite;            
        }
        @keyframes box {
            0%{
                left: 0px;
                top: 0px;
            }
            25%{
                left: 500px;
                top: 0px;
            }
            50%{
                left: 500px;
                top: 500px;
            }
            75%{
                left: 0px;
                top: 500px;
            }
            100%{
                top:0px;
                left: 0px;
            }
        }
         .box2{
            width: 250px;
            height: 250px;
            background-color: violet;
            position: relative;
            animation: box2 2s infinite;
        }   
        @keyframes box2{
            25%{
                left: calc(100% - 250px);
            }
            50%{
                left:calc(100% - 250px);
                top: 500px;
            }
            75%{
                right: 0px;
                top: 500px;
            }
            100%{
                top: 500px;
            }
        }    
        
    </style>
</head>
<body>
    <div class="box"></div>
    <div class="box2">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSb6Tid_B_LQH_8iZ3LvrAOpp0_xysrS2utlQ&s" width="100%" height="100%">
    </div>
</body>
</html>

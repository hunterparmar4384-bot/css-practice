<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API </title>

    <script>
        let allData = []

            async function myData()
            {
            const response = await fetch('https://jsonplaceholder.typicode.com/posts')
            allData = await response.json()
            datashow()
        }

        function datashow()
        {
            let print = ''
            allData.map((i,index) => {
                print += `<tr>
                         <td>${i.userId}</td>
                         <td>${i.id}</td>
                         <td>${i.title}</td>
                         <td>${i.body}</td>
                         </tr>`
            })
            document.getElementById('printdata').innerHTML = print
        }
        myData()
    </script>
</head>
<body>
      <table border="1">
        <tr>
            <td>USERID</td>
            <td>ID</td>
            <td>TITLE</td>
            <td>BODY</td>
        </tr>

        <tbody id="printdata"></tbody>
      </table>
</body>
</html>

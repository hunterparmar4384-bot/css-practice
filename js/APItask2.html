<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API task 2</title>
    
</head>
<body>

    <table border="2">
        <tr>
            <td>USER ID</td>
            <td>ID</td>
            <td>TITLE</td>              
        </tr>
        <tbody id="show"></tbody>
    </table>
    <script>

        alldata = []
        async function createdata()
        {
            let demo = await fetch('https://jsonplaceholder.typicode.com/albums')
            alldata = await demo.json()
            Showdata()
        }
         function Showdata()
         {
            let print = ''
            alldata.map((i,index)=>{
                print+=`<tr>
                        <td>${i.userId}</td>
                        <td>${i.id}</td>
                        <td>${i.title}</td>
                        </tr>`
            })
            document.getElementById('show').innerHTML = print
         }
         createdata()
    </script>
    
</body>
</html>

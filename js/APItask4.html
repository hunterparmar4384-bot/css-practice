<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API TASK4</title>
</head>
<body>
    <table border="1">
        <tr>
            <td>ID</td>
            <td>NAME</td>
            <td>USERNAME</td>
            <td>EMAIL</td>
            <td>ADDRESS</td>
        </tr>
        <tbody id="showdata"></tbody>
    </table>
    
    <script>

        alldata = []

        async function create()
        {
            let demo = await fetch('https://jsonplaceholder.typicode.com/users')
            alldata = await demo.json()
            mydata()            
        }

        function mydata()
        {
            let print = ''
            alldata.map((i,index)=>{
                print +=`<tr>
                         <td>${i.id}</td>
                         <td>${i.name}</td>
                         <td>${i.username}</td>
                         <td>${i.email}</td>
                         <td>${i.address.street}, ${i.address.city}</td>
                         </tr>`
            })
            document.getElementById('showdata').innerHTML=print
        }
        create()
    </script>
</body>
</html>

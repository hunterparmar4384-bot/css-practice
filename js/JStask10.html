<body>
    <h1>CALCULATOR</h1>
    <div class="caclu">
        <div class="box1">
            <input type="text"  id="num1" placeholder="value1">            
        </div>

        <div class="box2">
           <select class="box2" id="change">
                <option></option>   
                <option>+</option>
                <option>-</option>
                <option>*</option>
                <option>/</option>
            </select>        
        </div>

        <div class="box3">
            <input type="text" id="num2" placeholder="value2">
        </div>

        <div class="box4" id="result"></div>

        <div class="box5">
        <button class="btn1" onclick="count()"><i class="fa-solid fa-equals"></i></button>
        <button class="btn2" onclick="restart()"><i class="fa-solid fa-repeat"></i></button>
  
        </div>    

    </div>

    <script>
        function count()
        {
           let n1 = Number(document.getElementById('num1').value);
           let n2 = Number(document.getElementById('num2').value);
           let clc = document.getElementById('change').value;

           let ans;
           if(clc == '+')
           {
                ans = n1 + n2;
           }
           else if(clc == '-')
           { 
                ans = n1 - n2;
           }
           else if(clc == '*')
           {
                ans = n1 * n2;
           }
           else if(clc == '/')
           {
                ans = n1 / n2;
           }

           document.getElementById("result").innerHTML = ans;
        }

        function restart()
        {
            document.getElementById('num1').value="";
            document.getElementById('num2').value="";
            document.getElementById('change').selectedIndex = 0;
            document.getElementById('result').innerHTML ="";
        }
    </script>

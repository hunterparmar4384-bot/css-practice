<body>
    <div class="box1">
        <div class="box2" onclick="boxmove();"></div>
    </div>

     <script>
        //  function boxmove()
        //  {
        //      i = document.getElementsByClassName('box2')[0];
        //      i.style.transform ='translateX(500px)';            
        //  }      
         
         let move = 0;     
          function boxmove()
        {
             let  i = document.getElementsByClassName('box2')[0]

            if(move == 0)

             {
                 i.style.left = '500px' 
                 i.style.top = '0px'
             }
             else if(move == 1)
             {
                i.style.left = '500px'
                i.style.top = '500px'
             }
             else if(move == 2)
             {
                i.style.left = '0px'
                i.style.top = '500px'
             }
             else if(move == 3)
             {
                i.style.left = '0px'
                i.style.top = '0px'               
             }
             move++;
             
             if(move == 4)
             {
                move = 0;
             }
        }               
     
    </script> 
</body>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/js/JStask8.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>Document</title>
</head>
<body>
    <div class="slider">
        <div class="box1">
            <img src="https://www.cdmi.in/sliders/AI.jpg" width="100%" height="100%">
        </div>

        <div class="box2">
            <img src="https://www.cdmi.in/sliders/Ethical-Haking.webp" width="100%" height="100%">
        </div>

        <div class="box3">
            <img src="https://www.cdmi.in/sliders/NSDC1.jpg" width="100%" height="100%">
        </div>

        <div class="box4">
            <img src="https://www.cdmi.in/sliders/2.webp" width="100%" height="100%">
        </div>

         <div class="box5">
            <img src="https://www.cdmi.in/sliders/web-design-institute-gujarat-surat.webp" width="100%" height="100%">
        </div>

        <div class="box6">
            <img src="https://www.cdmi.in/sliders/5.webp" width="100%" height="100%">
        </div>

        <div class="box7">
            <img src="https://www.cdmi.in/sliders/graphic-design-institute-gujarat-surat.webp" width="100%" height="100%">
        </div>

        <div class="box8">
            <img src="https://www.cdmi.in/sliders/jtnlz6ehbdbbl2jfvrmm.webp" width="100%" height="100%">
        </div>

        <div class="lclick" onclick="prev()" ><i class="fa-solid fa-angle-left"></i></div>
        <div class="rclick" onclick="next()"><i class="fa-solid fa-angle-right"></i></div>

    </div>

    <script>

        step = 0;        
         function next(){

            let boxes = document.querySelectorAll(
                ".box1,.box2,.box3,.box4,.box5,.box6,.box7,.box8");
            
           boxes.forEach(box=>{
                box.style.display = "none";
           });

           boxes[step].style.display = "block";

           step++;
           if(step > 7)
           {
                step = 0;
           }

         }   

        function prev(){
           console.log(prev)
            
            let boxes = document.querySelectorAll(
                ".box1,.box2,.box3,.box4,.box5,.box6,.box7,.box8");

                boxes.forEach(box=>{
                    box.style.display ="none";
                });                

                step--;

                 if(step<0)
                 {
                     step = 7;
                 }   
                 
                 boxes[step].style.display = "block";
        }                                    
       
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script>
        let num = 10;

        switch(num )
        {
            case 1:
            document.write("one")
            break;

            case 2:
            document.write("two")
            break;

            case 3:
            document.write("third")
            break;

            case 4:
            document.write("four")
            break;

            case 5:
            document.write("five")
            break;

            case 6:
            document.write("six")
            break;

            case 7:
            document.write("seven")
            break;

            default:
            document.write("unvalid")
        } 


        document.write("<br>")
        let a = 10, b = 5;
        let sing = "*"

        document.write("A:",a);
        document.write("<br>B:",b);

        document.write("<br>")
        document.write("sing:",sing)

        document.write("<br>")


        switch(sing)
        {
            case "+":
            document.write("add:",a+b)
            break;

            case "-":
            document.write("sub:",a-b)
            break;

            case "*":
            document.write("multi:",a*b)
            break;

            case "/":
            document.write("div:",a/b)
            break;

            case "%":
            document.write("modual",a%b)
            break;

            default:
            document.write("this method is not working")

        }


        




    </script>
    
</body>
</html>
